name: Secret Scan

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret guard
        run: |
          chmod +x scripts/check-secrets.sh
          scripts/check-secrets.sh --all

